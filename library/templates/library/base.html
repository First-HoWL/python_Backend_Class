{% load static %}
<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}INDEX{% endblock %} — SCHOOL SHEDULE</title>
  <link rel="stylesheet" href="{% static 'library/Schedule_style.css' %}">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <nav class="main-nav">
        <a href="/" class="nav-link">Home</a>
        <a href="{% url 'schedule' %}" class="nav-link">Schedule</a>
        <a href="{% url 'teachers' %}" class="nav-link">Teachers</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span class="footer-copy">Group 2026-A Schedule © 2025</span>
      <div class="footer-socials">
        <a href="{% url 'schedule' %}">Full schedule</a>
        <a href="{% url 'teachers' %}">Teachers</a>
      </div>
    </div>
  </footer>

</body>
</html>
