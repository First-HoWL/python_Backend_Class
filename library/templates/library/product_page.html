{% extends "library/base.html"%}
{% load static %}
{% block title %}
Portfolio
{% endblock %}

{% block style %}
  <link rel="stylesheet" type="text/css" href="{% static 'library/catalog_style.css' %}">
{% endblock %}

{% block content %}

<div onclick="window.location.replace(`{% url 'main' %}`)" class="element">
    <img src="{{ product[0].image }}" alt="{{product[0].name}}" onerror="this.src=`{% static 'library/img/image-not-found.png' %}`" width="300px">
    <div class="in-element">
        <span>{{ product[0].name|title }}</span>
        <p>{{ product[0].description|truncatechars:35 }}</p>
        <span>{{ product[0].price|floatformat:2 }} грн.</span>
    </div>
</div>

{% endblock %}
