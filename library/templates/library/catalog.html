{% extends "library/base.html"%}
{% load static %}
{% block title %}
Contacts
{% endblock %}

{% block style %}
  <link rel="stylesheet" type="text/css" href="{% static 'library/catalog_style.css' %}">
{% endblock %}

{% block content %}

{% for el in products %}
<div onclick="window.location.replace(`{% url 'catalog' el.id %}`)" class="element">
    <img src="{{ el.image }}" alt="{{el.name}}" onerror="this.src=`{% static 'library/img/image-not-found.png' %}`" width="300px">
    <div class="in-element">
        <span>{{ el.name|title }}</span>
        <p>{{ el.description|truncatechars:35 }}</p>
        <span>{{ el.price|floatformat:2 }} грн.</span>
    </div>
</div>

{% endfor %}

{% endblock %}
